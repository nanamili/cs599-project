# ============================================
# 实验室安全事故案例库（MCP 数据源）
# 用于 Agent 检测到违规时引用真实事件警示
# ============================================

incidents:
  - id: INC-001
    date: "2025-09-12"
    source: "中国安全生产报"
    title: "某高校实验室透射电镜真空系统污染事故"
    equipment: "透射电子显微镜"
    category: "样品违规"
    severity: "高"
    summary: >
      某985高校材料学院研究生在未充分干燥样品的情况下将含水样品装入TEM样品杆，
      导致真空腔体水汽污染，真空度从1e-5 Pa骤降至1e-3 Pa。
      维修耗时2周，停机损失机时费约8万元，影响6个课题组20余名学生的实验进度。
    cause: "样品未完全干燥，违反SOP §2.1 第5条"
    penalty: "该生被暂停TEM操作资格3个月，需重新培训考核"
    lesson: "样品必须完全干燥后才能放入电镜。建议使用红外灯烘干至少10分钟，并用滤纸检测无湿痕。"

  - id: INC-002
    date: "2025-11-03"
    source: "实验室安全与管理"
    title: "ICP-MS进样系统腐蚀导致氩气泄漏"
    equipment: "ICP-MS 质谱仪"
    category: "操作违规"
    severity: "高"
    summary: >
      某检测机构实验员使用含氢氟酸(HF)的样品直接进样分析，未使用PTFE耐HF进样系统，
      导致石英雾化器和炬管被腐蚀。氩气从腐蚀裂缝泄漏，实验室氧浓度监测报警，
      2名实验员轻微头晕送医观察。
    cause: "含HF样品未提前告知管理员，未更换耐HF进样组件，违反SOP §五 Q2"
    penalty: "机构被责令停业整改2周，罚款5万元"
    lesson: "含HF、高氯酸等腐蚀性试剂样品必须提前告知管理员，使用专用进样系统。消解操作须在通风橱中进行。"

  - id: INC-003
    date: "2025-12-18"
    source: "高校实验室安全通报"
    title: "NMR超导磁体失超(Quench)事故"
    equipment: "核磁共振波谱仪"
    category: "安全违规"
    severity: "极高"
    summary: >
      某双一流高校博士生携带铁磁性工具进入NMR磁体间，扳手被强磁场吸附飞出击中磁体，
      引发局部失超(Quench)。液氦瞬间气化，磁体间氧浓度急剧下降，
      所幸实验员及时撤离未造成伤亡。磁体修复费用高达120万元，停机3个月。
    cause: "违反NMR磁体间禁令：携带铁磁性物品进入5高斯线内，违反SOP §四 第2条"
    penalty: "该生被取消NMR操作资格，导师被通报批评，实验室被全校通报"
    lesson: "进入NMR磁体间前必须清空所有金属物品（钥匙、手机、手表、腰带扣等）。建议门口安装金属探测器。"

  - id: INC-004
    date: "2026-01-15"
    source: "中国科学报"
    title: "XRD操作人员超时使用导致X射线泄漏恐慌"
    equipment: "X射线衍射仪"
    category: "管理违规"
    severity: "中"
    summary: >
      某研究所实验员为赶进度，连续操作XRD超过4小时（规定单次不超过4小时），
      期间X射线管过热，防护门安全联锁开关老化失效，X射线轻微泄漏。
      个人辐射剂量计显示当月累积剂量超标2倍。实验员被送医检查，所幸未造成健康损害。
    cause: "超时使用导致设备过热，防护门联锁老化未定期检测，违反SOP §三和§六"
    penalty: "实验员暂停辐射工作1个月，研究所更新所有XRD防护门联锁装置"
    lesson: "严格遵守单次最长预约时长限制。辐射设备需每月检测防护联锁，每年校准辐射监测仪。"

  - id: INC-005
    date: "2026-02-22"
    source: "IT安全资讯"
    title: "HPC集群被植入挖矿程序导致全校网络瘫痪"
    equipment: "高性能计算集群"
    category: "安全违规"
    severity: "高"
    summary: >
      某高校研究生在登录节点运行未经验证的第三方脚本，其中包含挖矿木马。
      木马通过SSH信任关系传播至64个计算节点，导致全部CPU满载。
      学校网络中心检测到异常流量（外连矿池），紧急断网隔离。
      集群停机排查72小时，清理木马+重装系统耗时1周，影响30+课题组。
    cause: "在登录节点运行未经审查的第三方程序，违反SOP §五 第2条"
    penalty: "该生账号被永久封禁，导师被约谈，课题组被扣减下季度50%计算配额"
    lesson: "登录节点仅用于作业提交和文件管理。所有程序需在计算节点运行。第三方脚本须经管理员安全审查。"

  - id: INC-006
    date: "2026-03-08"
    source: "实验安全通报"
    title: "未持证人员操作TEM导致灯丝烧毁"
    equipment: "透射电子显微镜"
    category: "资质违规"
    severity: "高"
    summary: >
      某高校材料学院研一学生借用师兄账号操作TEM，因不熟悉合轴流程，
      在灯丝电流未稳定时强行加高压，导致LaB6灯丝瞬间烧毁。
      灯丝更换费用2万元，停机3天。调查发现该生未取得TEM二级操作证书。
    cause: "无证操作 + 借用他人账号，违反实验室安全管理制度"
    penalty: "借出账号的师兄被暂停TEM权限6个月，违规学生被通报批评"
    lesson: "精密仪器操作必须持证上岗。账号不得外借。建议采用指纹或人脸识别登录。"

  - id: INC-007
    date: "2026-04-17"
    source: "实验室安全警示录"
    title: "连续爽约3次引发课题组间矛盾升级"
    equipment: "ICP-MS 质谱仪"
    category: "管理违规"
    severity: "低"
    summary: >
      某课题组研究生连续3次预约ICP-MS后爽约且未取消，导致其他课题组无法使用。
      第三次爽约时恰逢另一课题组赶论文deadline急需测试，双方发生激烈争吵，
      最终升级为课题组导师间的正式投诉。经实验室管理委员会调解才平息。
    cause: "预约后爽约且未及时取消，占用公共资源"
    penalty: "违规学生暂停预约权限2个月，课题组被限制高峰时段预约配额"
    lesson: "预约后如无法按时使用，应至少提前2小时取消。累计爽约2次自动暂停权限1个月。"
